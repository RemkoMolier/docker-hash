version: 2

project_name: docker-hash

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: docker-hash
    main: ./cmd/docker-hash
    binary: docker-hash
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  # Drop the {SHA}: prefix and ({author email}) suffix that goreleaser's
  # default github format adds. Squash-merge subjects already include the
  # PR number (e.g. "build: foo (#16)"), which is the most useful identifier.
  format: "{{.Message}}"
  groups:
    # Regex notes: ^.*? skips any line prefix (SHA, etc.) if goreleaser
    # applies the regex before `format` strips it. [^)]+ allows scopes
    # with hyphens, dots, or numbers (e.g. build(docker-hash):), unlike
    # the more restrictive [[:word:]]+ from goreleaser's docs example.
    - title: Features
      regexp: '^.*?feat(\([^)]+\))?!?:'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([^)]+\))?!?:'
      order: 1
    - title: Build & infrastructure
      regexp: '^.*?build(\([^)]+\))?!?:'
      order: 2
    - title: Refactor & performance
      regexp: '^.*?(refactor|perf)(\([^)]+\))?!?:'
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - "^(docs|chore|test|ci|style)(\\(.*\\))?:"

dockers:
  - id: docker-hash-linux-amd64
    ids:
      - docker-hash
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/remkomolier/docker-hash:{{ .Tag }}-amd64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/RemkoMolier/docker-hash"
      - "--label=org.opencontainers.image.licenses=MIT"
  - id: docker-hash-linux-arm64
    ids:
      - docker-hash
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/remkomolier/docker-hash:{{ .Tag }}-arm64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/RemkoMolier/docker-hash"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  # vX.Y.Z — exact version, always published (including pre-releases).
  # Recommended pin for production workloads.
  - name_template: "ghcr.io/remkomolier/docker-hash:{{ .Tag }}"
    image_templates:
      - "ghcr.io/remkomolier/docker-hash:{{ .Tag }}-amd64"
      - "ghcr.io/remkomolier/docker-hash:{{ .Tag }}-arm64"
  # vX.Y — minor-version floating tag; skipped for pre-releases.
  - name_template: "ghcr.io/remkomolier/docker-hash:v{{ .Major }}.{{ .Minor }}"
    image_templates:
      - "ghcr.io/remkomolier/docker-hash:{{ .Tag }}-amd64"
      - "ghcr.io/remkomolier/docker-hash:{{ .Tag }}-arm64"
    skip_push: "{{ if .Prerelease }}true{{ else }}false{{ end }}"
  # vX — major-version floating tag; skipped for pre-releases.
  - name_template: "ghcr.io/remkomolier/docker-hash:v{{ .Major }}"
    image_templates:
      - "ghcr.io/remkomolier/docker-hash:{{ .Tag }}-amd64"
      - "ghcr.io/remkomolier/docker-hash:{{ .Tag }}-arm64"
    skip_push: "{{ if .Prerelease }}true{{ else }}false{{ end }}"
  # latest — skipped for pre-releases.
  - name_template: "ghcr.io/remkomolier/docker-hash:latest"
    image_templates:
      - "ghcr.io/remkomolier/docker-hash:{{ .Tag }}-amd64"
      - "ghcr.io/remkomolier/docker-hash:{{ .Tag }}-arm64"
    skip_push: "{{ if .Prerelease }}true{{ else }}false{{ end }}"

release:
  # Auto-detect hyphenated semver suffixes (-rc1, -beta, -alpha, etc.)
  # and mark the GitHub Release as a pre-release accordingly.
  prerelease: auto
