version: 2

project_name: docker-hash

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: docker-hash
    main: ./cmd/docker-hash
    binary: docker-hash
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

# Syft-generated SBOMs, one per release archive, in both SPDX and CycloneDX
# JSON. Exposed as release assets alongside the archives they describe.
sboms:
  - id: spdx
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]
    documents: ["${artifact}.spdx.sbom.json"]
    artifacts: archive
  - id: cyclonedx
    cmd: syft
    args: ["$artifact", "--output", "cyclonedx-json=$document"]
    documents: ["${artifact}.cyclonedx.sbom.json"]
    artifacts: archive

# Keyless Sigstore signing for release archives and the checksums file.
# When args is overridden, the ${artifact}/${signature}/${certificate}
# placeholders are required; without them cosign wouldn't know what to
# sign or where to write the outputs.
signs:
  - id: sign-archives
    cmd: cosign
    artifacts: archive
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "--yes"
      - "${artifact}"
  - id: sign-checksum
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "--yes"
      - "${artifact}"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  # Drop the {SHA}: prefix and ({author email}) suffix that goreleaser's
  # default github format adds. Squash-merge subjects already include the
  # PR number (e.g. "build: foo (#16)"), which is the most useful identifier.
  format: "{{.Message}}"
  groups:
    # Regex notes: ^.*? skips any line prefix (SHA, etc.) if goreleaser
    # applies the regex before `format` strips it. [^)]+ allows scopes
    # with hyphens, dots, or numbers (e.g. build(docker-hash):), unlike
    # the more restrictive [[:word:]]+ from goreleaser's docs example.
    - title: Features
      regexp: '^.*?feat(\([^)]+\))?!?:'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([^)]+\))?!?:'
      order: 1
    - title: Build & infrastructure
      regexp: '^.*?build(\([^)]+\))?!?:'
      order: 2
    - title: Refactor & performance
      regexp: '^.*?(refactor|perf)(\([^)]+\))?!?:'
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - "^(docs|chore|test|ci|style)(\\(.*\\))?:"

nfpms:
  - id: docker-hash
    package_name: docker-hash
    vendor: Remko Molier
    homepage: https://github.com/RemkoMolier/docker-hash
    maintainer: Remko Molier <remko@molier.dev>
    description: "Compute a deterministic SHA-256 hash for Docker image builds"
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    section: utils
    rpm:
      group: Development/Tools

dockers_v2:
  - id: docker-hash
    ids:
      - docker-hash
    dockerfile: Dockerfile
    images:
      - "ghcr.io/remkomolier/docker-hash"
    # vX.Y.Z — exact version, always published (including pre-releases).
    # Recommended pin for production workloads.
    # vX.Y / vX / latest — floating tags; skipped for pre-releases (empty
    # templates are ignored by GoReleaser).
    tags:
      - "{{ .Tag }}"
      - "{{ if not .Prerelease }}v{{ .Major }}.{{ .Minor }}{{ end }}"
      - "{{ if not .Prerelease }}v{{ .Major }}{{ end }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.source": "https://github.com/RemkoMolier/docker-hash"
      "org.opencontainers.image.licenses": "MIT"

# Keyless Sigstore signing for every pushed image and manifest produced
# by dockers_v2. Splitting across two entries (images vs manifests) keeps
# the per-arch images signed in addition to the multi-arch manifest, so
# consumers who pull by digest still get a verifiable signature.
docker_signs:
  - id: sign-images
    cmd: cosign
    artifacts: images
    args: ["sign", "--yes", "${artifact}@${digest}"]
  - id: sign-manifests
    cmd: cosign
    artifacts: manifests
    args: ["sign", "--yes", "${artifact}@${digest}"]

scoops:
  - repository:
      owner: RemkoMolier
      name: scoop-docker-hash
      token: "{{ .Env.GORELEASER_TAP_TOKEN }}"
    homepage: https://github.com/RemkoMolier/docker-hash
    description: "Compute a deterministic SHA-256 hash for Docker image builds"
    license: MIT
    skip_upload: auto

brews:
  - repository:
      owner: RemkoMolier
      name: homebrew-tap
      token: "{{ .Env.GORELEASER_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/RemkoMolier/docker-hash
    description: "Compute a deterministic SHA-256 hash for Docker image builds"
    license: MIT
    skip_upload: auto
    test: |
      system "#{bin}/docker-hash", "--version"
    install: |
      bin.install "docker-hash"

release:
  # Auto-detect hyphenated semver suffixes (-rc1, -beta, -alpha, etc.)
  # and mark the GitHub Release as a pre-release accordingly.
  prerelease: auto
