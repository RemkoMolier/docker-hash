name: docker-hash
# Marketplace caps the description at 125 characters.
description: Compute a deterministic SHA-256 hash for a Docker image build from the Dockerfile, build args, and COPY/ADD sources.
author: Remko Molier

# Marketplace branding. Required for the GitHub Actions Marketplace
# listing; the allowed icon and colour values are fixed by GitHub and
# documented at
# https://docs.github.com/en/actions/sharing-automations/creating-actions/metadata-syntax-for-github-actions#branding
branding:
  icon: hash
  color: blue

inputs:
  file:
    description: Path to the Dockerfile, relative to the workflow's checkout.
    required: false
    default: Dockerfile
  context:
    description: Path to the build context directory, relative to the workflow's checkout.
    required: false
    default: .
  build-args:
    description: |
      Build arguments to include in the hash, one NAME=VALUE per line.
      Values may contain `=` characters; only the first `=` separates name and value.
      Empty lines and lines starting with `#` are ignored.
    required: false
    default: ""
  export-env-name:
    description: |
      Optional environment variable name to receive the computed hash. When set,
      the action also writes `<name>=<digest>` to `$GITHUB_ENV` so later steps in
      the same job can read it directly. The name must be a valid shell
      identifier (`[A-Za-z_][A-Za-z0-9_]*`) and may not start with `GITHUB_` or
      `RUNNER_` (reserved by the runner).
    required: false
    default: ""
  no-resolve-from:
    description: |
      Set to "true" to skip resolving FROM image digests against the upstream
      registry. FROM references are still expanded against ARG/ENV state and
      the base-image hash entry is still canonicalized offline (so `alpine`
      and `alpine:latest` produce the same base-image entry), but no network
      calls are made. Combine with `no-expand-args: "true"` to reproduce the
      v0.1.x hash shape exactly. Default: "false" (resolution is on).
    required: false
    default: "false"
  no-expand-args:
    description: |
      Set to "true" to disable ARG/ENV expansion in COPY/ADD source paths,
      `--from=` stage names and FROM image/platform references. With this
      flag set, a FROM line containing a `$VAR` reference causes docker-hash
      to fail rather than silently ignore the variable. Combine with
      `no-resolve-from: "true"` to reproduce the v0.1.x hash shape exactly.
      Default: "false" (expansion is on).
    required: false
    default: "false"
  platform:
    description: |
      Force a specific platform (e.g. "linux/amd64") when resolving FROM image
      digests for multi-arch images. Empty (the default) hashes the multi-arch
      index digest, which keeps the hash stable across runner architectures.
      Per-FROM `--platform=` flags in the Dockerfile always take precedence
      over this value.
    required: false
    default: ""
  auth-file:
    description: |
      Path to a registry auth file in Docker `config.json` or Podman/Skopeo
      `auth.json` format. When set, this is passed through to the underlying
      CLI as `--auth-file`, which sets `REGISTRY_AUTH_FILE` for the current
      run; the default keychain still consults the other auth sources
      ($HOME/.docker/config.json, $DOCKER_CONFIG,
      $XDG_RUNTIME_DIR/containers/auth.json) per their normal lookup order.
      Same semantic as the Skopeo/Podman/Buildah `--authfile` flag. Most
      workflows will not need this — `actions/checkout` plus
      `docker/login-action` already populate the default Docker config.
    required: false
    default: ""
  registries-conf:
    description: |
      Path to a Podman-style `registries.conf` TOML file describing per-
      registry mirrors. When set (and `no-resolve-from` is not "true"),
      FROM digest resolution is routed through the configured mirrors,
      with fallback to the upstream registry on connection error or HTTP
      5xx. The file uses the same `[[registry]]` / `[[registry.mirror]]`
      schema Podman, Buildah, Skopeo and CRI-O already consume, so an
      existing `/etc/containers/registries.conf` checked into the runner
      image (or mounted via `actions/checkout`) can be reused as-is.
      There is no auto-discovery: the path must be provided explicitly.
    required: false
    default: ""
  check:
    description: |
      Optional image-reference template to probe against the registry.
      When set, the action checks whether a tag matching the template
      already exists in the registry and exposes the result as the
      `exists` step output. The template must contain a literal `{hash}`
      placeholder which is substituted with the computed digest, e.g.
      `my-reg/app:build-{hash}` or `ghcr.io/org/app:build-{hash}-amd64`.
      A manifest 404 surfaces as `exists=no` (the step still succeeds so
      downstream jobs can branch on it); a registry/auth/network error
      fails the step. Authentication re-uses the same keychain as FROM
      resolution, so a prior `docker/login-action` works transparently.
    required: false
    default: ""

outputs:
  hash:
    description: The 64-character hex SHA-256 digest computed by docker-hash.
    value: ${{ steps.compute.outputs.hash }}
  exists:
    description: |
      "yes" if the image referenced by the rendered `check` template
      exists in the registry, "no" if the registry returned 404, or
      empty when `check` was not provided. Registry/auth/network errors
      fail the step rather than surfacing here.
    value: ${{ steps.compute.outputs.exists }}

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: ${{ github.action_path }}/go.mod
        cache-dependency-path: ${{ github.action_path }}/go.sum

    - name: Build docker-hash
      shell: bash
      working-directory: ${{ github.action_path }}
      run: go build -o "${RUNNER_TEMP}/docker-hash" ./cmd/docker-hash

    - name: Compute hash
      id: compute
      shell: bash
      env:
        INPUT_FILE: ${{ inputs.file }}
        INPUT_CONTEXT: ${{ inputs.context }}
        INPUT_BUILD_ARGS: ${{ inputs.build-args }}
        INPUT_NO_RESOLVE_FROM: ${{ inputs.no-resolve-from }}
        INPUT_NO_EXPAND_ARGS: ${{ inputs.no-expand-args }}
        INPUT_PLATFORM: ${{ inputs.platform }}
        INPUT_AUTH_FILE: ${{ inputs.auth-file }}
        INPUT_REGISTRIES_CONF: ${{ inputs.registries-conf }}
        INPUT_CHECK: ${{ inputs.check }}
      run: |
        set -euo pipefail
        BIN="${RUNNER_TEMP}/docker-hash"
        ARGS=( --file "$INPUT_FILE" --context "$INPUT_CONTEXT" )
        # Parse the multiline build-args input. One NAME=VALUE per non-empty
        # line; trim surrounding whitespace; skip blanks and `#` comments.
        if [[ -n "$INPUT_BUILD_ARGS" ]]; then
          while IFS= read -r line; do
            line="${line#"${line%%[![:space:]]*}"}"
            line="${line%"${line##*[![:space:]]}"}"
            [[ -z "$line" || "$line" == \#* ]] && continue
            ARGS+=( --build-arg "$line" )
          done <<< "$INPUT_BUILD_ARGS"
        fi
        # Optional FROM-resolution flags. The action surface mirrors the CLI
        # surface 1:1 so workflow authors don't have to learn two contracts.
        case "${INPUT_NO_RESOLVE_FROM,,}" in
          true|1|yes) ARGS+=( --no-resolve-from ) ;;
          ""|false|0|no) ;;
          *)
            echo "::error::no-resolve-from must be one of: true, false, 1, 0, yes, no (got '$INPUT_NO_RESOLVE_FROM')" >&2
            exit 1
            ;;
        esac
        case "${INPUT_NO_EXPAND_ARGS,,}" in
          true|1|yes) ARGS+=( --no-expand-args ) ;;
          ""|false|0|no) ;;
          *)
            echo "::error::no-expand-args must be one of: true, false, 1, 0, yes, no (got '$INPUT_NO_EXPAND_ARGS')" >&2
            exit 1
            ;;
        esac
        if [[ -n "$INPUT_PLATFORM" ]]; then
          ARGS+=( --platform "$INPUT_PLATFORM" )
        fi
        if [[ -n "$INPUT_AUTH_FILE" ]]; then
          ARGS+=( --auth-file "$INPUT_AUTH_FILE" )
        fi
        if [[ -n "$INPUT_REGISTRIES_CONF" ]]; then
          ARGS+=( --registries-conf "$INPUT_REGISTRIES_CONF" )
        fi
        # When the caller supplies a check template, request the bare
        # hash alongside the registry probe (--hash --check) so stdout
        # still carries the digest on both hit and miss. The exit code
        # tells us which happened: 0 = exists, 3 = not found, 2 =
        # registry/auth/network (fail the step — CI should retry).
        EXISTS=""
        if [[ -n "$INPUT_CHECK" ]]; then
          ARGS+=( --hash --check "$INPUT_CHECK" )
        fi
        set +e
        HASH="$("$BIN" "${ARGS[@]}")"
        DH_EXIT=$?
        set -e
        if [[ -n "$INPUT_CHECK" ]]; then
          case "$DH_EXIT" in
            0) EXISTS="yes" ;;
            3) EXISTS="no" ;;
            2)
              echo "::error::docker-hash --check: registry communication error (exit 2). This is retryable." >&2
              exit 1
              ;;
            *)
              echo "::error::docker-hash failed with exit $DH_EXIT" >&2
              exit 1
              ;;
          esac
        elif [[ "$DH_EXIT" -ne 0 ]]; then
          echo "::error::docker-hash failed with exit $DH_EXIT" >&2
          exit 1
        fi
        # Defensive: the CLI contract is a single 64-char lowercase hex
        # SHA-256 digest. Reject anything else before writing to
        # $GITHUB_OUTPUT (and downstream $GITHUB_ENV) so unexpected stdout
        # — extra lines, log text, an error string — can't corrupt the
        # output file or inject newlines into a later workflow step.
        if [[ ! "$HASH" =~ ^[0-9a-f]{64}$ ]]; then
          echo "::error::docker-hash CLI returned unexpected output (expected a 64-char hex SHA-256 digest):" >&2
          printf '%s\n' "$HASH" >&2
          exit 1
        fi
        echo "hash=$HASH" >> "$GITHUB_OUTPUT"
        echo "docker-hash: $HASH"
        if [[ -n "$EXISTS" ]]; then
          echo "exists=$EXISTS" >> "$GITHUB_OUTPUT"
          echo "docker-hash: image exists=$EXISTS"
        fi

    - name: Export env var
      if: inputs.export-env-name != ''
      shell: bash
      env:
        EXPORT_ENV_NAME: ${{ inputs.export-env-name }}
        HASH: ${{ steps.compute.outputs.hash }}
      run: |
        set -euo pipefail
        # Reject anything that isn't a POSIX shell identifier so we don't write
        # garbage into $GITHUB_ENV (which would silently corrupt later steps).
        if [[ ! "$EXPORT_ENV_NAME" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
          echo "::error::export-env-name '$EXPORT_ENV_NAME' is not a valid shell identifier" >&2
          exit 1
        fi
        # Reject reserved prefixes the runner uses for its own state.
        if [[ "$EXPORT_ENV_NAME" == GITHUB_* || "$EXPORT_ENV_NAME" == RUNNER_* ]]; then
          echo "::error::export-env-name '$EXPORT_ENV_NAME' uses a reserved prefix (GITHUB_*, RUNNER_*)" >&2
          exit 1
        fi
        echo "$EXPORT_ENV_NAME=$HASH" >> "$GITHUB_ENV"
        echo "exported $EXPORT_ENV_NAME to \$GITHUB_ENV"
