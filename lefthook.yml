pre-commit:
  parallel: true
  commands:
    gofmt:
      glob: "**/*.go"
      run: gofmt -l -w {staged_files}
      stage_fixed: true
    golangci-lint:
      glob: "**/*.go"
      run: golangci-lint run --fix {staged_files}
      stage_fixed: true
    markdownlint:
      glob: "**/*.md"
      run: npm ci --prefix .github/markdownlint --ignore-scripts --silent && npx --prefix .github/markdownlint markdownlint-cli2 --fix {staged_files}
      stage_fixed: true
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}
