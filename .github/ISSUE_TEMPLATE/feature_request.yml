name: Feature request
description: Propose an improvement to docker-hash.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
        Please describe the problem and what interface you want to improve.

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What are you trying to achieve?
      placeholder: Describe the workflow and why this capability is needed.
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: Current workaround
      description: How are you handling this today?
      placeholder: Describe any workaround, script, or manual process.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed flag/input surface
      description: Describe the CLI flag, action input, or OCI usage change you want.
      placeholder: |
        Proposed interface:
        Example usage:
        Backward compatibility concerns:
    validations:
      required: true
