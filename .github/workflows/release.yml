name: Release

on:
  push:
    tags:
      # Shape filter: only run on tag pushes with at least two dots,
      # which is enough to exclude the floating action refs (vX, vX.Y)
      # maintained by the "Update floating action tags" step below so
      # they can't re-trigger this workflow. Stricter semver validation
      # (`^v[0-9]+\.[0-9]+\.[0-9]+$`, plus pre-release handling) lives
      # inside that step, not in the trigger.
      - 'v*.*.*'
  # The auto-release workflow dispatches this workflow after pushing a
  # tag, because GITHUB_TOKEN-created tag pushes do not trigger other
  # workflows. Manual dispatch with --ref <tag> also works for reruns.
  workflow_dispatch: {}

# Keep the workflow-default GITHUB_TOKEN scope minimal. Write scopes live on
# the job below so Scorecard's Token-Permissions check passes (top-level
# `contents: write` / `packages: write` scored 0) while preserving the same
# runtime privileges.
permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          # renovate: datasource=github-releases depName=goreleaser/goreleaser
          version: v2.15.2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_TAP_TOKEN: ${{ secrets.GORELEASER_TAP_TOKEN }}

      # Attestation runs before the floating-tag update so a push failure
      # on the mutable refs can't skip provenance for artifacts that have
      # already been published to the GitHub Release and GHCR.
      - name: Attest build provenance for release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          # Attests each artifact listed inside checksums.txt (the
          # archives, nfpms, and SBOMs).
          subject-checksums: dist/checksums.txt

      - name: Attest build provenance for checksums.txt
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          # Separate step so checksums.txt itself also carries provenance
          # — subject-checksums only attests the files listed inside the
          # checksum file, not the checksum file itself.
          subject-path: dist/checksums.txt

      - name: Update floating action tags
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Floating major/minor git tags (vX, vX.Y) are the action-side
          # equivalent of the dockers_v2 floating image tags in
          # .goreleaser.yaml. They let consumers pin
          # `uses: RemkoMolier/docker-hash@v0` (or @v0.1) and get patch/minor
          # updates automatically. Skip pre-releases so hyphenated tags
          # like v0.2.0-rc1 never promote to the floating refs, matching
          # the pre-release tag-skipping policy in dockers_v2.
          if [[ "$TAG" == *-* ]]; then
            echo "::notice::tag '$TAG' is a pre-release, skipping floating action tag update"
            exit 0
          fi
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.[0-9]+$ ]]; then
            echo "::notice::tag '$TAG' is not a simple semver vX.Y.Z, skipping floating action tag update"
            exit 0
          fi
          # Resolve the commit the release tag points at explicitly, rather
          # than trusting ${{ github.sha }}. That context value is the commit
          # for push-of-lightweight-tag events, but for annotated-tag pushes
          # (which RELEASING.md prescribes for all release tags) some edge
          # cases have been reported where it resolves to the tag object
          # instead of the underlying commit, which would point the floating
          # refs at a nested tag. `^{commit}` peels annotated tags to their
          # commit unconditionally.
          COMMIT=$(git rev-parse "${TAG}^{commit}")
          MAJOR="v${BASH_REMATCH[1]}"
          MINOR="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          echo "Updating floating action tags: $MAJOR, $MINOR -> $COMMIT (from $TAG)"
          git tag -f "$MAJOR" "$COMMIT"
          git tag -f "$MINOR" "$COMMIT"
          git push --force origin "refs/tags/$MAJOR" "refs/tags/$MINOR"
