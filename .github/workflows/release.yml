name: Release

on:
  push:
    tags:
      # Shape filter: only run on tag pushes with at least two dots,
      # which is enough to exclude the floating action refs (vX, vX.Y)
      # maintained by the "Update floating action tags" step below so
      # they can't re-trigger this workflow. Stricter semver validation
      # (`^v[0-9]+\.[0-9]+\.[0-9]+$`, plus pre-release handling) lives
      # inside that step, not in the trigger.
      - 'v*.*.*'

permissions:
  contents: write
  actions: none
  checks: none
  deployments: none
  issues: none
  packages: write
  pull-requests: none
  repository-projects: none
  security-events: none
  statuses: none

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          # renovate: datasource=github-releases depName=goreleaser/goreleaser
          version: v2.15.2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update floating action tags
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Floating major/minor git tags (vX, vX.Y) are the action-side
          # equivalent of the dockers_v2 floating image tags in
          # .goreleaser.yaml. They let consumers pin
          # `uses: RemkoMolier/docker-hash@v0` (or @v0.1) and get patch/minor
          # updates automatically. Skip pre-releases so hyphenated tags
          # like v0.2.0-rc1 never promote to the floating refs, matching
          # the pre-release tag-skipping policy in dockers_v2.
          if [[ "$TAG" == *-* ]]; then
            echo "::notice::tag '$TAG' is a pre-release, skipping floating action tag update"
            exit 0
          fi
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.[0-9]+$ ]]; then
            echo "::notice::tag '$TAG' is not a simple semver vX.Y.Z, skipping floating action tag update"
            exit 0
          fi
          # Resolve the commit the release tag points at explicitly, rather
          # than trusting ${{ github.sha }}. That context value is the commit
          # for push-of-lightweight-tag events, but for annotated-tag pushes
          # (which RELEASING.md prescribes for all release tags) some edge
          # cases have been reported where it resolves to the tag object
          # instead of the underlying commit, which would point the floating
          # refs at a nested tag. `^{commit}` peels annotated tags to their
          # commit unconditionally.
          COMMIT=$(git rev-parse "${TAG}^{commit}")
          MAJOR="v${BASH_REMATCH[1]}"
          MINOR="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          echo "Updating floating action tags: $MAJOR, $MINOR -> $COMMIT (from $TAG)"
          git tag -f "$MAJOR" "$COMMIT"
          git tag -f "$MINOR" "$COMMIT"
          git push --force origin "refs/tags/$MAJOR" "refs/tags/$MINOR"
