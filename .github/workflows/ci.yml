name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('push-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test ./... -race -count=1

  vet:
    name: Vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Run go vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          # renovate: datasource=github-releases depName=golangci/golangci-lint
          version: v2.11.4

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Build binary
        run: |
          VERSION=$(git describe --tags --always --dirty)
          COMMIT=$(git rev-parse HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build \
            -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            ./cmd/docker-hash/

  mod-tidy:
    name: Module hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
      - name: Install markdownlint-cli2 + custom rules
        # Install into a tmp prefix outside the repo checkout so no Node
        # tooling files (package.json, package-lock.json, node_modules/)
        # ever land in the working tree. --ignore-scripts blocks third-
        # party install hooks for supply-chain hardening.
        # Renovate can manage these pinned versions via a custom regex
        # manager if desired.
        run: |
          PREFIX=$(mktemp -d /tmp/mdlint.XXXXXX)
          echo "MDLINT_PREFIX=$PREFIX" >> "$GITHUB_ENV"
          cd "$PREFIX"
          npm init -y >/dev/null
          npm install --no-save --silent --ignore-scripts \
            markdownlint-cli2@0.22.0 \
            markdownlint-rule-max-one-sentence-per-line@0.0.2
      - name: Run markdownlint
        # Run from the repo root so .markdownlint-cli2.yaml and the
        # **/*.md glob resolve relative to the checkout. NODE_PATH lets
        # the cli2 process require() the custom rule from the tmp prefix.
        run: |
          NODE_PATH="$MDLINT_PREFIX/node_modules" \
            npx --prefix "$MDLINT_PREFIX" markdownlint-cli2 "**/*.md"

  action-self-test:
    name: Action self-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run docker-hash composite action via uses ./
        id: action
        uses: ./
        with:
          file: ./testdata/action/Dockerfile
          context: ./testdata/action
          build-args: |
            VERSION=1.2.3
            ENV=test
          export-env-name: TEST_HASH

      - name: Verify action output matches direct CLI invocation
        # Build from the same source the action used and run with the same
        # inputs. The two digests must be byte-identical or the wrapper has
        # diverged from the underlying CLI.
        run: |
          set -euo pipefail
          go build -o /tmp/docker-hash-direct ./cmd/docker-hash
          DIRECT="$(/tmp/docker-hash-direct \
            --file ./testdata/action/Dockerfile \
            --context ./testdata/action \
            --build-arg VERSION=1.2.3 \
            --build-arg ENV=test)"
          ACTION="${{ steps.action.outputs.hash }}"
          if [[ "$ACTION" != "$DIRECT" ]]; then
            echo "::error::action output ($ACTION) does not match direct CLI ($DIRECT)"
            exit 1
          fi
          echo "action output matches direct CLI: $ACTION"

      - name: Verify env export propagates to later steps
        run: |
          set -euo pipefail
          if [[ -z "${TEST_HASH:-}" ]]; then
            echo "::error::TEST_HASH was not exported to \$GITHUB_ENV"
            exit 1
          fi
          if [[ "$TEST_HASH" != "${{ steps.action.outputs.hash }}" ]]; then
            echo "::error::TEST_HASH ($TEST_HASH) does not match step output (${{ steps.action.outputs.hash }})"
            exit 1
          fi
          echo "env export verified: TEST_HASH=$TEST_HASH"

      - name: Verify build-args containing = are preserved end-to-end
        # Acceptance criterion #4: a value with `=` in it must reach the CLI
        # intact rather than being split on the first `=`.
        id: with_equals
        uses: ./
        with:
          file: ./testdata/action/Dockerfile
          context: ./testdata/action
          build-args: |
            VERSION=v1.0.0+build=42
            ENV=k=v

      - name: Verify equals-preservation matches direct CLI
        run: |
          set -euo pipefail
          DIRECT="$(/tmp/docker-hash-direct \
            --file ./testdata/action/Dockerfile \
            --context ./testdata/action \
            --build-arg 'VERSION=v1.0.0+build=42' \
            --build-arg 'ENV=k=v')"
          ACTION="${{ steps.with_equals.outputs.hash }}"
          if [[ "$ACTION" != "$DIRECT" ]]; then
            echo "::error::equals-preservation: action ($ACTION) does not match direct CLI ($DIRECT)"
            exit 1
          fi
          echo "equals preservation verified: $ACTION"

      - name: Verify no-resolve-from + no-expand-args reproduces the v0.1.x hash
        # Acceptance criterion: passing BOTH flags must be bit-for-bit
        # identical to a v0.1.x hash for the same inputs. The hash below was
        # captured from a v0.1.0 binary against the same testdata fixture
        # (see the action self-test history on the v0.1.0 release-cut
        # session). Since v0.2.0, --no-resolve-from alone enables an
        # "offline" mode that still expands ARGs and canonicalizes
        # references; only the combination of both flags reproduces v0.1.x.
        id: v01_compat
        uses: ./
        with:
          file: ./testdata/action/Dockerfile
          context: ./testdata/action
          build-args: |
            VERSION=1.2.3
            ENV=test
          no-resolve-from: "true"
          no-expand-args: "true"

      - name: Assert v0.1.x compat hash matches v0.1.0
        env:
          EXPECTED: 55e348f31bff6556278c8bccaf0ba3763299859f11afd79179e0d68f51a8a9d5
          GOT: ${{ steps.v01_compat.outputs.hash }}
        run: |
          set -euo pipefail
          if [[ "$GOT" != "$EXPECTED" ]]; then
            echo "::error::v0.1.x compat hash drift: got $GOT, expected $EXPECTED"
            echo "::error::This means --no-resolve-from + --no-expand-args is no longer bit-for-bit compatible with v0.1.x."
            exit 1
          fi
          echo "v0.1.x compat (--no-resolve-from + --no-expand-args) preserves v0.1.x hash: $GOT"

      - name: Verify v0.1.x compat also matches the direct CLI
        run: |
          set -euo pipefail
          DIRECT="$(/tmp/docker-hash-direct \
            --no-resolve-from \
            --no-expand-args \
            --file ./testdata/action/Dockerfile \
            --context ./testdata/action \
            --build-arg VERSION=1.2.3 \
            --build-arg ENV=test)"
          ACTION="${{ steps.v01_compat.outputs.hash }}"
          if [[ "$ACTION" != "$DIRECT" ]]; then
            echo "::error::v0.1.x compat: action ($ACTION) does not match direct CLI ($DIRECT)"
            exit 1
          fi
          echo "v0.1.x compat action↔CLI parity verified: $ACTION"
